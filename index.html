<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>Gnosia Fan Simulator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="container">

  <div class="panel" id="roster">
    <h2>명단 관리</h2>
    <p>캐릭터를 추가/관리하는 영역</p>
  </div>

  <div class="panel" id="settings">
    <h2>게임 설정</h2>
    <p>역할 설정 영역</p>
  </div>

  <div class="panel" id="log">
    <h2>실행 & 로그</h2>
    <div id="logArea">아직 로그 없음</div>
    <button>실행</button>
  </div>

  <div class="panel" id="relations">
    <h2>관계도</h2>
    <p>신뢰도 / 우호도 표시 영역</p>
  </div>

</div>

</body>
</html>
